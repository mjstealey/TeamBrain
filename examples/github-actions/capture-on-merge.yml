# capture-on-merge.yml — capture a TeamBrain memory when a PR is merged
# ======================================================================
# On PR merge, this workflow captures a decision memory into TeamBrain with a
# link back to the PR. It uses the Phase 5 non-interactive API token: the
# opaque token is exchanged for a short-lived JWT, then the capture is made
# with that JWT.
#
# Human-in-the-loop gate: the job targets a GitHub *Environment*
# (`teambrain-capture`). Configure that Environment in the repo settings with
# **Required reviewers** so the job pauses for manual approval before any
# memory is written. (A full setup can add an LLM step that summarizes the PR
# and proposes 0–3 captures; the Environment approval is the gate either way.)
#
# To adopt:
#   1. Register the repo as a TeamBrain project (its owner/repo slug must
#      equal github.repository), then have a project admin issue a token:
#        POST https://pr.fabric-testbed.net/functions/v1/teambrain-token/token
#      Store the returned `tbk_…` value as the repo secret TEAMBRAIN_TOKEN.
#   2. Add the public anon key as the repo *variable* TEAMBRAIN_ANON_KEY
#      (it is not a secret — it is the same key the landing page ships to
#      browsers; it only satisfies the gateway's "some valid JWT" check).
#   3. Create an Environment named `teambrain-capture` with Required reviewers.
#   4. Drop this file into .github/workflows/ of the registered repo.

name: TeamBrain — capture on merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  capture:
    # Only on actual merges, not every closed PR.
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    # Human-approval gate — pauses until a Required reviewer approves.
    environment: teambrain-capture
    env:
      TEAMBRAIN_BASE: https://pr.fabric-testbed.net/functions/v1
      TEAMBRAIN_TOKEN: ${{ secrets.TEAMBRAIN_TOKEN }}     # opaque tbk_ token (secret)
      TEAMBRAIN_ANON_KEY: ${{ vars.TEAMBRAIN_ANON_KEY }}  # public anon key (gateway pass)
      PROJECT_SLUG: ${{ github.repository }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
    steps:
      - name: Exchange token and capture merged-PR decision
        run: |
          set -euo pipefail

          if [ -z "${TEAMBRAIN_TOKEN:-}" ] || [ -z "${TEAMBRAIN_ANON_KEY:-}" ]; then
            echo "::warning::TEAMBRAIN_TOKEN / TEAMBRAIN_ANON_KEY not set — skipping capture."
            exit 0
          fi

          # 1. Exchange the opaque token for a short-lived (15 min) access JWT.
          #    Two headers: the opaque token in X-TeamBrain-Token, and the
          #    public anon key as the bearer (the gateway requires a valid JWT;
          #    the exchange endpoint ignores it).
          access_token=$(curl -sS -X POST \
            "${TEAMBRAIN_BASE}/teambrain-token/token/exchange" \
            -H "Authorization: Bearer ${TEAMBRAIN_ANON_KEY}" \
            -H "X-TeamBrain-Token: ${TEAMBRAIN_TOKEN}" \
            | jq -r '.access_token // empty')

          if [ -z "${access_token}" ]; then
            echo "::error::token exchange failed (no access_token returned)"
            exit 1
          fi
          # Keep the minted JWT out of any subsequent log line.
          echo "::add-mask::${access_token}"

          # 2. Build the capture body with jq so the PR title is JSON-escaped
          #    safely (titles can contain quotes, backslashes, emoji, etc.).
          #    PR-controlled values are passed via env + --arg, never spliced
          #    into the script — this avoids shell/script injection.
          body=$(jq -n \
            --arg content "Merged PR #${PR_NUMBER}: ${PR_TITLE}" \
            --arg slug    "${PROJECT_SLUG}" \
            --arg pr      "${PR_URL}" \
            --arg sha     "${MERGE_SHA}" \
            '{
               content: $content,
               scope: "project",
               type: "decision",
               project_slug: $slug,
               linked_pr_url: $pr,
               linked_commit_sha: $sha,
               tags: ["pr-merge", "auto-capture"]
             }')

          # 3. Capture with the minted JWT against the REST surface.
          http_code=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
            -X POST "${TEAMBRAIN_BASE}/teambrain-rest/thoughts" \
            -H "Authorization: Bearer ${access_token}" \
            -H "Content-Type: application/json" \
            -d "${body}")

          echo "TeamBrain responded HTTP ${http_code}"
          cat /tmp/resp.json
          # Don't fail the merge pipeline on a capture hiccup.
          if [ "${http_code}" -ge 300 ]; then
            echo "::warning::TeamBrain capture failed (HTTP ${http_code})"
          fi
