# deploy/production/docker-compose.override.yml — TeamBrain-specific
# overrides for the production self-hosted Supabase stack on
# pr.fabric-testbed.net.
#
# This file is COPIED (not symlinked) into /opt/supabase-stack/ during
# the production deploy, where it auto-merges with upstream's
# docker-compose.yml and docker-compose.caddy.yml. Compose merge
# precedence: docker-compose.yml → caddy overlay (-f) → this override
# (auto-discovered). Our override wins for any conflicting key.
#
# What this file changes vs. stock supabase:
#   1. functions container — env passthrough for every TeamBrain edge
#      function. The stock functions service hard-codes a minimal env
#      list; arbitrary new vars (OPENAI_API_KEY, EMBEDDING_*,
#      TEAMBRAIN_*, etc.) must be listed here or they will not reach
#      the Deno workers.
#   2. db container — pin Postgres 17 image for parity with scratch.
#      Stock supabase docker-compose.yml uses an older default; we run
#      the same major version on scratch and production so
#      migration/RLS testing translates.
#   3. kong container — add a loopback-only host bind so on-VM
#      `curl http://127.0.0.1:8000/...` works for smoke tests and
#      debugging. Caddy already proxies public traffic; the loopback
#      bind is reachable only from the VM itself.
#
# What this file does NOT do:
#   * No Caddy block. Upstream's docker-compose.caddy.yml handles TLS
#     termination, Let's Encrypt registration via $CERTBOT_EMAIL, and
#     Studio basic-auth gating. See ../README.md for the compose
#     invocation that loads both overlays.
#   * No ollama sidecar. Uncomment the `ollama:` block below if this
#     deployment chose the self-host embedding variant (ADR 0001
#     § Decision 5 / docs/deployment.md § "Choose an embedding
#     provider"). If you do, also apply migrations/0005 BEFORE any
#     thoughts are captured.

services:

  # ---- Postgres major-version pin -----------------------------------------
  db:
    image: supabase/postgres:17.6.1.084
    # Production VMs are x86_64; do NOT set `platform:` (omitting lets
    # compose pick the right manifest variant for the host). On Apple
    # Silicon scratch we pin linux/arm64 to avoid Rosetta emulation;
    # not relevant here.

  # ---- Connection pooler: NOTE — no override here works ----------------
  #
  # The supavisor pooler ships in upstream's docker-compose.yml bound to
  # `${POSTGRES_PORT}:5432` = `0.0.0.0:5432:5432` — publicly reachable on
  # any host with an open network path. TeamBrain's pilot doesn't need
  # supavisor: PostgREST / GoTrue / Storage all reach the db container
  # directly over the docker network.
  #
  # Compose v2.27.0 SILENTLY IGNORES every override we tried under the
  # supavisor service key. Each of the following had no effect on the
  # resulting container's ports (verified via `docker ps` and
  # `docker compose config --no-interpolate`):
  #   - `ports: !reset` with replacement loopback entries
  #   - `ports: !reset []` (upstream caddy overlay's pattern for kong)
  #   - `ports: !override []`
  #   - `profiles: ["disabled"]`
  # `--force-recreate supavisor` and full `down`+`up` cycles both kept
  # the base's `${POSTGRES_PORT}:5432` bind. Same overrides on the kong
  # service DO merge (verified by changing image / env behavior), so
  # this is something supavisor-specific in compose v2.27.0's merge
  # logic. Unidentified at session-end.
  #
  # Working workaround documented in README §6 Path B: sed-delete the
  # three supavisor `ports:` lines from `~/supabase-stack/docker-compose.yml`
  # directly. That's a box-local edit, not a TeamBrain-repo change.
  # supavisor still starts, just without host port bindings, and stays
  # reachable from other containers via the docker network.
  #
  # If you find the override-merge root cause, this comment block can
  # be replaced by a proper `supavisor:` block here and the README's
  # sed step dropped.

  # ---- GoTrue: GitHub OAuth provider --------------------------------------
  #
  # Upstream's docker-compose.yml ships the four GOTRUE_EXTERNAL_GITHUB_*
  # mappings commented out (it's a generic stack). Without them, GoTrue
  # has no idea the GITHUB_* values in .env exist, and
  # `/auth/v1/authorize?provider=github` returns:
  #   {"code":400,"error_code":"validation_failed",
  #    "msg":"Unsupported provider: provider is not enabled"}
  #
  # The override below wires the env interpolation so GITHUB_ENABLED /
  # GITHUB_CLIENT_ID / GITHUB_SECRET in .env actually reach the GoTrue
  # container. REDIRECT_URI is the public callback registered on the
  # OAuth App (set in fabric-testbed org under TeamBrain (production)).
  auth:
    environment:
      GOTRUE_EXTERNAL_GITHUB_ENABLED:      ${GITHUB_ENABLED}
      GOTRUE_EXTERNAL_GITHUB_CLIENT_ID:    ${GITHUB_CLIENT_ID}
      GOTRUE_EXTERNAL_GITHUB_SECRET:       ${GITHUB_SECRET}
      GOTRUE_EXTERNAL_GITHUB_REDIRECT_URI: ${API_EXTERNAL_URL}/auth/v1/callback
      # Access-token lifetime. Default upstream is 3600s (1 hour), which
      # forces pilot developers to re-mint a JWT for every Claude Code /
      # Cursor MCP session. Bumped to 24h here as a deliberate pilot
      # tradeoff: longer-lived token vs. less friction. The refresh-token
      # flow (landing-page Renew button) extends a session indefinitely
      # within the JWT_EXP window without forcing a fresh GitHub
      # round-trip. Re-evaluate when external collaborators are added.
      GOTRUE_JWT_EXP: "86400"

  # ---- Edge Functions: TeamBrain env passthrough --------------------------
  #
  # Every Deno worker under volumes/functions/ inherits this env block.
  # Add new keys here when a new function or feature needs them.
  functions:
    environment:
      # --- Embedding provider (ADR 0001 § Decision 5) ---
      # OpenAI default. Switch to ollama by:
      #   1. Uncomment the `ollama:` service block at the bottom.
      #   2. Set EMBEDDING_PROVIDER=ollama, EMBEDDING_DIMS="768",
      #      OLLAMA_URL=http://ollama:11434, OLLAMA_EMBEDDING_MODEL=nomic-embed-text
      #      and remove the OPENAI_* lines here.
      #   3. Apply migrations/0005_resize_embedding_768.sql BEFORE any
      #      thoughts are captured (or accept re-embedding every existing
      #      row after switching).
      EMBEDDING_PROVIDER:               openai
      EMBEDDING_DIMS:                   "1536"
      OPENAI_API_KEY:                   ${OPENAI_API_KEY}
      OPENAI_EMBEDDING_MODEL:           text-embedding-3-small

      # --- TeamBrain MCP function defaults ---
      # Lets clients omit project_slug in single-pilot deployments.
      TEAMBRAIN_DEFAULT_PROJECT_SLUG:   ${TEAMBRAIN_DEFAULT_PROJECT_SLUG:-fabric-testbed/fabric-core-api}

      # --- Phase 3 GitHub membership-sync App credentials ---
      # Production app (distinct from the scratch / dev app — see
      # docs/deployment.md § "Scratch vs production: register two
      # Apps"). The PEM must be PKCS#8 (`-----BEGIN PRIVATE KEY-----`,
      # no "RSA"); convert with `openssl pkcs8 -topk8 ...` if GitHub
      # gave you PKCS#1.
      TEAMBRAIN_GITHUB_APP_ID:          ${TEAMBRAIN_GITHUB_APP_ID}
      TEAMBRAIN_GITHUB_INSTALLATION_ID: ${TEAMBRAIN_GITHUB_INSTALLATION_ID}
      TEAMBRAIN_GITHUB_APP_PRIVATE_KEY: ${TEAMBRAIN_GITHUB_APP_PRIVATE_KEY}

  # ---- (Optional) ollama sidecar for self-host embedding variant ----------
  #
  # Uncomment this entire block AND change the functions.environment
  # block above to point at OLLAMA_URL. See ADR 0001 § Decision 5 for
  # when this variant is appropriate.
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: supabase-ollama
  #   restart: unless-stopped
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   entrypoint: ["/bin/sh", "-c"]
  #   command:
  #     - |
  #       /bin/ollama serve &
  #       pid=$!
  #       until /bin/ollama list >/dev/null 2>&1; do sleep 1; done
  #       /bin/ollama pull nomic-embed-text
  #       wait $pid
  #   healthcheck:
  #     test: ["CMD-SHELL", "ollama list | grep -q nomic-embed-text"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 30
  #     start_period: 120s

