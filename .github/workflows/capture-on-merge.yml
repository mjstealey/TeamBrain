# capture-on-merge.yml — propose a TeamBrain memory when a PR merges, capture it
# when a human approves. EVENT-DRIVEN (no blocking, no timer, no idle cost).
# =============================================================================
# Phase 5 § C (revised). Two triggers in one file:
#
#   on: pull_request[closed, merged]  →  propose job  →  opens an approval ISSUE, exits
#   on: issue_comment[created]        →  capture job  →  runs ONLY when an approver
#                                                        comments `/approve` (or `/deny`)
#
# WHY EVENT-DRIVEN (decision C-D5, revised): the original design blocked a runner
# on `trstringer/manual-approval` for up to GitHub's 6-hour job limit while it
# polled for an "approved" comment — on 2026-06-15 that idled ~2,520 wasted
# minutes across 7 un-actioned merges. Here the propose job OPENS an issue and
# EXITS; the approval issue then sits open at ZERO Actions cost until someone
# comments. A `/approve` comment fires the capture job as a SEPARATE, short run.
# "I'll get to it when I get to it" — no timer, no auto-close.
#
# Each event runs exactly ONE job: the other's `if:` is false, so GitHub SKIPS it
# (a skipped job bills 0 minutes). `issue_comment` fires for PR comments too — the
# capture `if:` excludes those (`!github.event.issue.pull_request`) and requires
# the `teambrain-capture` label the propose job applies.
#
# WHY the JWT is re-minted (decision C-D1): the opaque `tbk_` token is durable,
# but the JWT it mints lives only 15 minutes. The capture run mints its own.
#
# Server-side summarization (decision C-D2): the propose job sends only PR
# METADATA (title, body, commit messages, changed-file PATHS — never diffs, per
# C-D4) to `teambrain-summarize`, which holds the AI key and prompt.
#
# Injection posture (C-D8): every PR / LLM / comment-controlled value reaches the
# shell only via `env:` + `jq --arg/--argjson` (and `gh … --body-file` / a
# `python3` stdin parse), never spliced into a `run:` script or a `${{ }}` inside
# a run line. The approval issue's proposal text and the embedded machine payload
# are written and read as data, so they are not injection vectors.
#
# Disabling capture WITHOUT removing this file (decision C-D9): two switches,
# neither of which edits this committed workflow.
#   * Zero Actions minutes — set the repo VARIABLE TEAMBRAIN_CAPTURE to `off`.
#     The propose job's `if:` then skips before a runner starts. Unset (or any
#     other value) = on.
#   * Central, per-repo, no repo change — flip the toggle for this repo on the
#     TeamBrain /repos dashboard. The propose job reads that server-side flag
#     right after its token exchange (step 3a) and clean-skips when it is off.
#
# To adopt:
#   1. Register the repo as a TeamBrain project (its owner/repo slug must equal
#      github.repository), then have a project admin issue a token:
#        POST https://pr.fabric-testbed.net/functions/v1/teambrain-token/token
#      Store the returned `tbk_…` value as the repo secret TEAMBRAIN_TOKEN.
#   2. Add the public anon key as the repo *variable* TEAMBRAIN_ANON_KEY
#      (not a secret — the same key the landing page ships to browsers; it only
#      satisfies the gateway's "some valid JWT" check on the exchange call).
#   3. (Optional) set the repo *variable* TEAMBRAIN_APPROVERS to a comma- or
#      newline-separated list of GitHub usernames allowed to approve a capture.
#      If unset, anyone with push / maintain / admin on the repo may approve.
#   4. Drop this file into .github/workflows/ of the registered repo.

name: TeamBrain — capture on merge

on:
  pull_request:
    types: [closed]
  issue_comment:
    types: [created]

# Least privilege: the workflow grants nothing by default; each job opts in.
permissions: {}

# NOTE: concurrency is per-JOB, not top-level. A top-level group keyed on the PR
# number would evaluate to an empty string on issue_comment events (no PR in that
# context) and wrongly serialize every approval comment into one queue.

jobs:
  # ---------------------------------------------------------------------------
  # propose — on a merged PR, gather metadata, ask teambrain-summarize for 0–3
  # captures, and OPEN an approval issue holding them. Then exit. No writes, no
  # waiting, no idle runner.
  # ---------------------------------------------------------------------------
  propose:
    # Disable without editing this file (C-D9): the repo VARIABLE
    # TEAMBRAIN_CAPTURE=off skips this job before a runner starts (0 Actions
    # minutes). Unset / any other value = on. The complementary CENTRAL switch is
    # the server flag read in step 3a (toggled from the /repos dashboard).
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      vars.TEAMBRAIN_CAPTURE != 'off'
    runs-on: ubuntu-latest
    timeout-minutes: 10           # backstop against a hung curl; not an approval timer
    permissions:
      contents: read
      pull-requests: read         # `gh api` reads the PR's commits + changed files
      issues: write               # open the approval issue
    concurrency:
      group: teambrain-propose-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    env:
      TEAMBRAIN_BASE:     https://pr.fabric-testbed.net/functions/v1
      TEAMBRAIN_TOKEN:    ${{ secrets.TEAMBRAIN_TOKEN }}     # opaque tbk_ token (secret)
      TEAMBRAIN_ANON_KEY: ${{ vars.TEAMBRAIN_ANON_KEY }}     # public anon key (gateway pass)
      GH_TOKEN:           ${{ github.token }}                # for `gh api` / `gh issue`
      PROJECT_SLUG:       ${{ github.repository }}
      PR_NUMBER:          ${{ github.event.pull_request.number }}
      PR_TITLE:           ${{ github.event.pull_request.title }}
      PR_BODY:            ${{ github.event.pull_request.body }}
      PR_URL:             ${{ github.event.pull_request.html_url }}
      MERGE_SHA:          ${{ github.event.pull_request.merge_commit_sha }}
    steps:
      - name: Propose captures and open the approval issue
        run: |
          set -euo pipefail

          # Box-bound curls: bound the connect time and retry a couple of times
          # so a brief network blip to the host is absorbed rather than failing
          # the run. A longer outage still degrades to a clean skip via the
          # http_code/jq guards below (curl emits "000" on a final connect-fail).
          CURL_RETRY=(--connect-timeout 30 --retry 2 --retry-connrefused --retry-delay 10)

          if [ -z "${TEAMBRAIN_TOKEN:-}" ] || [ -z "${TEAMBRAIN_ANON_KEY:-}" ]; then
            echo "::warning::TEAMBRAIN_TOKEN / TEAMBRAIN_ANON_KEY not set — skipping."
            exit 0
          fi

          # 1. Gather PR metadata (metadata only — C-D4; no diff contents). gh +
          #    jq are preinstalled on ubuntu-latest. Emit JSON arrays so the
          #    values pass to jq --argjson already-escaped (commit messages can
          #    contain anything). Degrade to [] if the API call hiccups.
          commits_json=$(gh api "repos/${PROJECT_SLUG}/pulls/${PR_NUMBER}/commits?per_page=100" --jq '[.[].commit.message]' || echo '[]')
          paths_json=$(gh api "repos/${PROJECT_SLUG}/pulls/${PR_NUMBER}/files?per_page=100"   --jq '[.[].filename]'      || echo '[]')
          commits_json=${commits_json:-[]}
          paths_json=${paths_json:-[]}

          # 2. Build the request body — PR-controlled strings via --arg/--argjson.
          req=$(jq -n \
            --arg     slug    "$PROJECT_SLUG" \
            --arg     title   "$PR_TITLE" \
            --arg     body    "${PR_BODY:-}" \
            --argjson commits "$commits_json" \
            --argjson paths   "$paths_json" \
            '{project_slug: $slug, title: $title, body: $body, commits: $commits, changed_paths: $paths}')

          # 3. Exchange the opaque token for a short-lived JWT (used immediately).
          access_token=$(curl -sS "${CURL_RETRY[@]}" -X POST "${TEAMBRAIN_BASE}/teambrain-token/token/exchange" \
            -H "Authorization: Bearer ${TEAMBRAIN_ANON_KEY}" \
            -H "X-TeamBrain-Token: ${TEAMBRAIN_TOKEN}" \
            | jq -r '.access_token // empty' || true)
          if [ -z "${access_token}" ]; then
            echo "::error::token exchange failed (no access_token returned)"; exit 1
          fi
          echo "::add-mask::${access_token}"

          # 3a. Central kill switch (server-side, keyed by repo slug). Read this
          #     project's capture flag with the JWT just minted. If an admin has
          #     disabled capture-on-merge from the /repos dashboard, stop here —
          #     no LLM call, no approval issue. FAIL-OPEN: only an explicit
          #     `false` disables; any error/timeout proceeds, because a missed
          #     disable wastes one run while a false-disable would silently drop
          #     capture. (jq `//` can't supply this default — it treats the
          #     literal `false` as empty — so test it explicitly.)
          enabled=$(curl -sS "${CURL_RETRY[@]}" -G "${TEAMBRAIN_BASE}/teambrain-rest/project" \
            --data-urlencode "project_slug=${PROJECT_SLUG}" \
            -H "Authorization: Bearer ${access_token}" \
            | jq -r 'if .capture_on_merge_enabled == false then "false" else "true" end' 2>/dev/null || echo "true")
          if [ "${enabled}" = "false" ]; then
            echo "capture-on-merge is disabled for ${PROJECT_SLUG} on the server; skipping (no proposal, no approval issue)."
            {
              echo "## TeamBrain — capture-on-merge disabled for PR #${PR_NUMBER}"
              echo ""
              echo "Server-side capture is **disabled** for \`${PROJECT_SLUG}\`. Re-enable it from the TeamBrain /repos dashboard."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # 3b. Dedup BEFORE proposing (C-D7, exact via linked_pr_url): if this
          #     PR's captures already exist, stop — no LLM call, no approval issue.
          existing=$(curl -sS "${CURL_RETRY[@]}" -G "${TEAMBRAIN_BASE}/teambrain-rest/thoughts" \
            --data-urlencode "project_slug=${PROJECT_SLUG}" \
            --data-urlencode "linked_pr_url=${PR_URL}" \
            --data-urlencode "limit=1" \
            -H "Authorization: Bearer ${access_token}" \
            | jq '(.results // []) | length' || echo 0)
          if [ "${existing:-0}" -gt 0 ]; then
            echo "Already captured for ${PR_URL} (found ${existing}); skipping — no proposal, no approval issue."
            {
              echo "## TeamBrain — already captured for PR #${PR_NUMBER}"
              echo ""
              echo "Captures for [${PR_URL}](${PR_URL}) already exist; nothing to propose."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # 4. Ask teambrain-summarize for 0–3 proposals.
          http_code=$(curl -sS "${CURL_RETRY[@]}" -o /tmp/propose.json -w '%{http_code}' \
            -X POST "${TEAMBRAIN_BASE}/teambrain-summarize/propose" \
            -H "Authorization: Bearer ${access_token}" \
            -H "Content-Type: application/json" \
            -d "${req}") || http_code="000"
          if [ "${http_code}" -ge 300 ] || [ "${http_code}" = "000" ]; then
            echo "::warning::teambrain-summarize returned HTTP ${http_code}"; cat /tmp/propose.json 2>/dev/null || true
            exit 0
          fi

          count=$(jq -r '.count // (.proposals | length) // 0' /tmp/propose.json)

          # 5. Render the proposals into the run summary.
          {
            echo "## TeamBrain — proposed captures for PR #${PR_NUMBER}"
            echo ""
            echo "**${count}** proposal(s) for [${PR_URL}](${PR_URL})."
            echo ""
            if [ "${count}" -eq 0 ]; then
              echo "_No durable memories proposed. Nothing to approve._"
            else
              echo "An approval issue will list these; comment \`/approve\` to write them."
              echo ""
              jq -r '.proposals[] | "### \(.type)\n\n\(.content)\n\n_tags: \((.tags // []) | tostring)_\n"' /tmp/propose.json
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # 6. Open the approval issue (only when count>0) and EXIT. No runner
          #    idles for a human — a later `/approve` comment triggers the capture
          #    job as a separate, short run. The issue body carries BOTH a
          #    human-readable list and a machine payload in an HTML comment.
          if [ "${count}" -eq 0 ]; then
            echo "No durable memories proposed; no approval issue opened."
            exit 0
          fi

          proposals_md=$(jq -r '.proposals[] | "- **\(.type)** — \(.content)\n  tags: \((.tags // []) | tostring)"' /tmp/propose.json)

          # Machine-readable record: PR/provenance via --arg/--argjson, proposals
          # via --slurpfile, so no LLM/PR string is ever a shell word. One compact
          # line so it sits cleanly inside the HTML comment.
          payload=$(jq -c -n \
            --arg     pr_url "$PR_URL" \
            --arg     sha    "${MERGE_SHA:-}" \
            --argjson pr_num "$PR_NUMBER" \
            --arg     slug   "$PROJECT_SLUG" \
            --slurpfile p     /tmp/propose.json \
            '{pr_url: $pr_url, merge_sha: $sha, pr_number: $pr_num,
              project_slug: $slug, proposals: ($p[0].proposals // [])}')

          # Body via file (never a `run:` word). The marker line is parsed back
          # out by the capture job — its shape is load-bearing; DO NOT edit it.
          {
            echo "A merged PR proposed the TeamBrain captures below."
            echo ""
            echo "Comment \`/approve\` to write them, or \`/deny\` to discard all."
            echo "Only repo collaborators with push access (or the \`TEAMBRAIN_APPROVERS\`"
            echo "allowlist) may approve. **This issue costs zero GitHub Actions minutes"
            echo "while it waits** — approve whenever you get to it; there is no time limit."
            echo ""
            printf '%s\n' "$proposals_md"
            echo ""
            echo "Source: ${PR_URL}"
            echo ""
            printf '<!-- tb-capture: %s -->\n' "$payload"
          } > /tmp/issue-body.md

          # The label scopes the capture trigger; create it idempotently so the
          # first-ever run in a fresh repo doesn't fail on a missing label.
          gh label create teambrain-capture --color BFD4F2 \
            --description "TeamBrain capture-on-merge approval" 2>/dev/null || true

          issue_url=$(gh issue create \
            --title "TeamBrain: approve ${count} capture(s) for PR #${PR_NUMBER}" \
            --label teambrain-capture \
            --body-file /tmp/issue-body.md)
          echo "Opened approval issue: ${issue_url}"
          {
            echo ""
            echo "[Approval issue opened](${issue_url}) — comment \`/approve\` there to write the captures (no time limit, no Actions cost while it waits)."
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # capture — fires when an approver comments `/approve` (or `/deny`) on the
  # teambrain-capture issue the propose job opened. No blocking, no timer: the
  # issue waits at zero Actions cost until someone acts (decision C-D5, revised).
  # ---------------------------------------------------------------------------
  capture:
    # Fire ONLY on an approve/deny comment to an OPEN, teambrain-capture-labeled
    # ISSUE. `issue_comment` also fires for PR comments — `!…pull_request`
    # excludes those. A non-matching comment makes this `if:` false ⇒ the job is
    # SKIPPED ⇒ 0 billed minutes. Accepts `/approve`|`approve`(d) / `/deny`|`deny`(d).
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.state == 'open' &&
      !github.event.issue.pull_request &&
      contains(github.event.issue.labels.*.name, 'teambrain-capture') &&
      (startsWith(github.event.comment.body, '/approve') ||
       startsWith(github.event.comment.body, '/deny') ||
       startsWith(github.event.comment.body, 'approve') ||
       startsWith(github.event.comment.body, 'deny'))
    runs-on: ubuntu-latest
    timeout-minutes: 10           # backstop only; there is no waiting step
    permissions:
      contents: read
      issues: write               # comment on + close the approval issue
    concurrency:
      # Serialize comments on the SAME issue so two near-simultaneous /approve
      # comments can't both pass the dedup and double-write.
      group: teambrain-capture-issue-${{ github.event.issue.number }}
      cancel-in-progress: false
    env:
      TEAMBRAIN_BASE:     https://pr.fabric-testbed.net/functions/v1
      TEAMBRAIN_TOKEN:    ${{ secrets.TEAMBRAIN_TOKEN }}
      TEAMBRAIN_ANON_KEY: ${{ vars.TEAMBRAIN_ANON_KEY }}
      GH_TOKEN:           ${{ github.token }}
      PROJECT_SLUG:       ${{ github.repository }}
      ISSUE_NUMBER:       ${{ github.event.issue.number }}
      ISSUE_BODY:         ${{ github.event.issue.body }}      # holds the tb-capture payload
      COMMENT_BODY:       ${{ github.event.comment.body }}    # the approve/deny command
      COMMENTER:          ${{ github.event.comment.user.login }}
      APPROVERS:          ${{ vars.TEAMBRAIN_APPROVERS }}     # optional allowlist
    steps:
      - name: Authorize, then capture or deny
        run: |
          set -euo pipefail
          CURL_RETRY=(--connect-timeout 30 --retry 2 --retry-connrefused --retry-delay 10)

          # 0. Classify the command from the comment's first token (CR-stripped).
          #    COMMENT_BODY is read via env, never spliced into a `run:` word.
          cmd=$(printf '%s' "${COMMENT_BODY}" | head -n1 | tr -d '\r' | awk '{print $1}')
          case "$cmd" in
            /approve*|approve*) action=approve ;;
            /deny*|deny*)       action=deny ;;
            *) echo "comment is not an approve/deny command ('${cmd}'); nothing to do"; exit 0 ;;
          esac

          # 1. Authorize the commenter. Allowlist (TEAMBRAIN_APPROVERS) wins when
          #    set; otherwise require push/maintain/admin on the repo. Matched via
          #    jq over env values (no shell splice).
          authorized=false
          if [ -n "${APPROVERS:-}" ]; then
            match=$(jq -rn --arg who "$COMMENTER" --arg list "$APPROVERS" \
              '($list | gsub("[,\n]"; " ") | split(" ") | map(select(length > 0))) | index($who) // empty')
            [ -n "$match" ] && authorized=true
          else
            perm=$(gh api "repos/${PROJECT_SLUG}/collaborators/${COMMENTER}/permission" --jq '.permission' 2>/dev/null || echo none)
            case "$perm" in admin|maintain|write) authorized=true ;; esac
          fi
          if [ "$authorized" != "true" ]; then
            gh issue comment "$ISSUE_NUMBER" --body "@${COMMENTER} is not authorized to approve TeamBrain captures — no action taken. (Authorized: repo push/maintain/admin, or the \`TEAMBRAIN_APPROVERS\` allowlist.)"
            echo "::notice::unauthorized commenter ${COMMENTER}; left the issue open"
            exit 0
          fi

          # 2. Deny: discard all, close as not-planned. No write.
          if [ "$action" = "deny" ]; then
            gh issue comment "$ISSUE_NUMBER" --body "Denied by @${COMMENTER}. No captures written. Closing."
            gh issue close "$ISSUE_NUMBER" --reason "not planned"
            exit 0
          fi

          # 3. Extract the machine payload from the issue body (env -> python on
          #    stdin; the body never becomes a shell word).
          payload=$(printf '%s' "${ISSUE_BODY}" | python3 -c 'import sys,re; m=re.search(r"<!--\s*tb-capture:\s*(\{.*\})\s*-->", sys.stdin.read(), re.S); sys.stdout.write(m.group(1) if m else "")')
          if [ -z "$payload" ]; then
            gh issue comment "$ISSUE_NUMBER" --body "Could not find the TeamBrain capture payload in this issue body (was it edited?). No captures written. Closing."
            gh issue close "$ISSUE_NUMBER" --reason "not planned"
            exit 0
          fi
          printf '%s' "$payload" > /tmp/payload.json
          PR_URL=$(jq -r '.pr_url' /tmp/payload.json)
          MERGE_SHA=$(jq -r '.merge_sha // ""' /tmp/payload.json)
          PR_NUMBER=$(jq -r '.pr_number' /tmp/payload.json)
          jq -c '.proposals // []' /tmp/payload.json > /tmp/proposals.json
          PR_TAG="${PROJECT_SLUG}#${PR_NUMBER}"

          # 4. Fresh JWT — the propose job's 15-min token is long gone.
          access_token=$(curl -sS "${CURL_RETRY[@]}" -X POST "${TEAMBRAIN_BASE}/teambrain-token/token/exchange" \
            -H "Authorization: Bearer ${TEAMBRAIN_ANON_KEY}" \
            -H "X-TeamBrain-Token: ${TEAMBRAIN_TOKEN}" \
            | jq -r '.access_token // empty' || true)
          if [ -z "${access_token}" ]; then
            echo "::error::token exchange failed (no access_token returned)"; exit 1
          fi
          echo "::add-mask::${access_token}"

          # 5. Idempotency: re-dedup via linked_pr_url (a capture may have landed
          #    via another path while the issue waited).
          existing=$(curl -sS "${CURL_RETRY[@]}" -G "${TEAMBRAIN_BASE}/teambrain-rest/thoughts" \
            --data-urlencode "project_slug=${PROJECT_SLUG}" \
            --data-urlencode "linked_pr_url=${PR_URL}" \
            --data-urlencode "limit=1" \
            -H "Authorization: Bearer ${access_token}" \
            | jq '(.results // []) | length' || echo 0)
          if [ "${existing:-0}" -gt 0 ]; then
            gh issue comment "$ISSUE_NUMBER" --body "Already captured for ${PR_URL} (found ${existing}). No duplicates written. Closing."
            gh issue close "$ISSUE_NUMBER" --reason "completed"
            exit 0
          fi

          # 6. Write each approved proposal. Provenance + PR_TAG added here;
          #    content/type/tags come from the payload via jq (never the shell).
          n=$(jq 'length' /tmp/proposals.json)
          echo "Capturing ${n} proposal(s) for ${PR_TAG}…"
          captured=""
          for i in $(jq -r 'keys[]' /tmp/proposals.json); do
            body=$(jq -c \
              --arg     slug "$PROJECT_SLUG" \
              --arg     pr   "$PR_URL" \
              --arg     sha  "${MERGE_SHA:-}" \
              --arg     tag  "$PR_TAG" \
              --argjson i    "$i" \
              '.[$i] as $p | {
                 content:           $p.content,
                 scope:             "project",
                 type:              ($p.type // "context"),
                 project_slug:      $slug,
                 linked_pr_url:     $pr,
                 linked_commit_sha: $sha,
                 tags:              ((($p.tags // []) + ["pr-merge", "auto-capture", $tag]) | unique)
               }' /tmp/proposals.json)

            http_code=$(curl -sS "${CURL_RETRY[@]}" -o /tmp/cap_resp.json -w '%{http_code}' \
              -X POST "${TEAMBRAIN_BASE}/teambrain-rest/thoughts" \
              -H "Authorization: Bearer ${access_token}" \
              -H "Content-Type: application/json" \
              -d "${body}") || http_code="000"
            if [ "${http_code}" -ge 300 ] || [ "${http_code}" = "000" ]; then
              echo "::warning::capture ${i} failed (HTTP ${http_code})"; cat /tmp/cap_resp.json 2>/dev/null || true
            else
              id=$(jq -r '.id' /tmp/cap_resp.json)
              echo "captured proposal ${i}: ${id}"
              captured="${captured} ${id}"
            fi
          done

          # 7. Report + close.
          gh issue comment "$ISSUE_NUMBER" --body "Approved by @${COMMENTER}. Captured ${n} memory(ies):${captured:- (none — see the run log)}. Closing."
          gh issue close "$ISSUE_NUMBER" --reason "completed"
